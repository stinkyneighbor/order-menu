    <style>
        body { font-family: '微軟正黑體', sans-serif; padding: 20px; max-width: 500px; margin: auto; background-color: #f9f9f9; color: #333; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #d35400; text-align: center; margin-top: 0; margin-bottom: 5px; }
        .sub-title { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #2c3e50; }
        label span { color: #e74c3c; font-size: 12px; margin-left: 5px; }
        input[type="text"], select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; background-color: #fff; }
        
        /* 時間下拉選單排版 */
        .time-group { display: flex; gap: 5px; align-items: center; }
        .time-group select { flex: 1; text-align: center; }

        /* 餐點品項樣式 */
        .item-container { border-bottom: 1px solid #edf2f7; padding: 15px 0; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; }
        .menu-name { font-size: 16px; font-weight: bold; }
        .menu-price { color: #e74c3c; font-weight: bold; margin-right: 10px; }
        .qty-control { display: flex; align-items: center; }
        .qty-btn { background: #edf2f7; border: none; padding: 6px 16px; font-size: 18px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .qty-btn:hover { background: #e2e8f0; }
        .qty-input { width: 40px; text-align: center; border: none; font-size: 16px; font-weight: bold; background: transparent; }
        
        /* 客製化選項區塊 */
        .custom-options { display: none; background-color: #f7fafc; padding: 12px; border-radius: 6px; margin-top: 10px; border-left: 4px solid #ff9800; }
        .option-title { font-size: 13px; font-weight: bold; color: #4a5568; margin-bottom: 6px; }
        .checkbox-group { display: flex; gap: 15px; margin-bottom: 8px; font-size: 14px; }
        .checkbox-group label { font-weight: normal; display: flex; align-items: center; gap: 4px; cursor: pointer; margin: 0; }
        .checkbox-group input { width: 16px; height: 16px; cursor: pointer; }
        .spice-select { padding: 4px 8px; font-size: 14px; width: auto; display: inline-block; height: auto; margin-top: 4px; }

        .total-price { font-size: 26px; color: #e74c3c; font-weight: bold; }
        button.submit-btn { width: 100%; padding: 15px; background-color: #ff9800; color: white; border: none; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 10px; box-shadow: 0 4px 6px rgba(255, 152, 0, 0.3); transition: background 0.2s; }
        button.submit-btn:hover { background-color: #e68a00; }
    </style>
</head>
<body>

        <div class="form-group">
            <label>💰 總金額：</label>
            <div class="total-price">$ <span id="displayTotal">0</span></div>
        </div>

        <div class="form-group">

            <input type="text" id="notes" placeholder="如有其他特殊需求請寫在這裡">
        </div>

        <button onclick="submitOrder()" id="submitBtn" class="submit-btn">🚀 送出訂單</button>
    </div>

    <script>
        // 自動生成日期下拉選單 (今天 + 接下來7天)
        window.onload = function() {
            const monthSelect = document.getElementById("timeMonth");
            const daySelect = document.getElementById("timeDay");
            const hourSelect = document.getElementById("timeHour");
            
            // 生成24小時制的小時
            for(let i=0; i<24; i++) {
                let h = i < 10 ? "0"+i : i;
                hourSelect.options.add(new Option(h, h));
            }
            
            // 智慧日期滾動生成
            let dateOptions = [];
            for(let i=0; i<7; i++) {
                let d = new Date();
                d.setDate(d.getDate() + i);
                let m = d.getMonth() + 1;
                let day = d.getDate();
                dateOptions.push({ m: m, d: day });
            }
            
            // 塞入月份 (不重複)
            let months = [...new Set(dateOptions.map(item => item.m))];
            months.forEach(m => monthSelect.options.add(new Option(m, m)));
            
            // 根據選擇的月份連動日期
            function updateDays() {
                daySelect.innerHTML = "";
                let selectedMonth = parseInt(monthSelect.value);
                dateOptions.forEach(item => {
                    if(item.m === selectedMonth) {
                        daySelect.options.add(new Option(item.d, item.d));
                    }
                });
            }
            monthSelect.onchange = updateDays;
            updateDays(); // 初始化
        };

        // 控制數量增減與自動展開客製化區塊
        function changeQty(inputId, amount) {
            let inputField = document.getElementById(inputId);
            let currentVal = parseInt(inputField.value);
            let newVal = currentVal + amount;
            if (newVal < 0) newVal = 0;
            inputField.value = newVal;
            
            // 控制客製化面板展開/隱藏
            let optionsPanel = document.getElementById("options_" + inputId);
            if(newVal > 0) {
                optionsPanel.style.display = "block";
            } else {
                optionsPanel.style.display = "none";
            }
            
            calculateTotal();
        }

        function calculateTotal() {
            let items = document.querySelectorAll('.item-data');
            let total = 0;
            items.forEach(item => {
                let qty = parseInt(item.value);
                let price = parseInt(item.getAttribute('data-price'));
                total += qty * price;
            });
            document.getElementById('displayTotal').innerText = total;
        }

        // 送出訂單
        function submitOrder() {
            const btn = document.getElementById("submitBtn");
            const customerName = document.getElementById("customerName").value;
            const customerPhone = document.getElementById("customerPhone").value;
            const total = document.getElementById("displayTotal").innerText;
            const customNotes = document.getElementById("notes").value;
            
            // 取餐時間收集
            const tM = document.getElementById("timeMonth").value;
            const tD = document.getElementById("timeDay").value;
            const tH = document.getElementById("timeHour").value;
            const tMin = document.getElementById("timeMin").value;
            const pickupTime = `${tM}月${tD}日 ${tH}:${tMin}`;
            
            // 餐具收集
            const utensils = document.querySelector('input[name="utensils"]:checked').value;

            // 表單防呆驗證
            if(customerName.trim() === "") { alert("請輸入您的稱呼喔！"); return; }
            if(customerPhone.trim() === "") { alert("請輸入您的手機號碼喔！"); return; }
            if(parseInt(total) === 0) { alert("您還沒有點選餐點喔！"); return; }

            // 核心邏輯：打包餐點與專屬客製化文字
            let orderItemsArray = [];
            document.querySelectorAll('.item-data').forEach(item => {
                let qty = parseInt(item.value);
                if (qty > 0) {
                    let name = item.getAttribute('data-name');
                    let id = item.id;
                    let panel = document.getElementById("options_" + id);
                    
                    // 撈取口味細節
                    let details = [];
                    let chks = panel.querySelectorAll('input[type="checkbox"]:checked');
                    chks.forEach(c => details.push(c.parentNode.innerText.trim()));
                    
                    let spice = panel.querySelector('.spice-select');
                    if(spice && spice.value !== "不要辣") {
                        details.push(spice.value);
                    }
                    
                    let detailStr = details.length > 0 ? ` (${details.join(', ')})` : '';
                    orderItemsArray.push(`${name} x${qty}${detailStr}`);
                }
            });
            let orderItemsString = orderItemsArray.join("\n");

            // 完美打包至後台相容變數
            const packedName = `${customerName} (${customerPhone})`;
            const packedNotes = `[預計取餐] ${pickupTime}\n[餐具需求] ${utensils}\n[老闆備註] ${customNotes}`;

            // 你的 Google Apps Script 網址 (維持原樣)
            const scriptUrl = "https://script.google.com/macros/s/AKfycbynN_sVX8Fonmrwd_oxGOdbaebHz_lwgexbfIWZQI_yqrsVOVaaXwxjx5PEc1m_r6XXDQ/exec"; 
            
            btn.innerText = "訂單傳送中...";
            btn.disabled = true;

            const orderData = {
                customerName: packedName,
                orderItems: orderItemsString,
                totalPrice: total,
                notes: packedNotes
            };

            fetch(scriptUrl, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(orderData),
                redirect: "follow"
            })
            .then(response => response.json())
            .then(data => {
                alert("🎉 訂單已成功送出！高山頂小吃已收到通知囉！");
                window.location.reload();
            })
            .catch(error => {
                alert("送出失敗，請檢查網路連線，或直接向老闆點餐喔！");
            })
            .finally(() => {
                btn.innerText = "🚀 送出訂單";
                btn.disabled = false;
            });
        }
    </script>
